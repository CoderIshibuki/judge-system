<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Judge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gray: {
                900: '#111827',
                800: '#1F2937',
                700: '#374151',
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- Navbar -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center shrink-0">
        <h1 class="text-2xl font-bold text-blue-400">⚡ CodeJudge</h1>
        <div class="flex items-center space-x-4">
            <span class="text-sm text-gray-400">Real-time connection: <span id="conn-status" class="text-yellow-500">Connecting...</span></span>
            <div class="bg-gray-700 rounded p-1 flex text-sm">
                <button id="btn-contestant" class="px-3 py-1 rounded bg-blue-600 text-white font-medium">Contestant</button>
                <button id="btn-admin" class="px-3 py-1 rounded text-gray-300 hover:text-white">Admin</button>
            </div>
        </div>
    </header>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden flex-1 overflow-auto bg-gray-900 p-8 text-gray-200">
        <h2 class="text-2xl font-bold mb-6">Admin Dashboard</h2>
        <div class="bg-gray-800 p-6 rounded-lg max-w-2xl border border-gray-700">
            <h3 class="text-lg font-semibold mb-4 border-b border-gray-700 pb-2">Add New Problem</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Title</label>
                    <input id="admin-prob-title" type="text" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Description</label>
                    <textarea id="admin-prob-desc" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-blue-500"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Time Limit (ms)</label>
                        <input id="admin-prob-time" type="number" value="1000" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Memory Limit (KB)</label>
                        <input id="admin-prob-memory" type="number" value="256000" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Testcases (JSON array format: [{"name":"1.in","content":"..."}, ...])</label>
                    <textarea id="admin-prob-testcases" rows="4" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-blue-500 font-mono text-sm" placeholder='[{"name": "1.in", "content": "1 2\n"}, {"name": "1.out", "content": "3\n"}]'></textarea>
                </div>
                <button id="admin-submit-btn" class="bg-green-600 hover:bg-green-500 text-white font-medium py-2 px-6 rounded-md transition-colors w-full">Create Problem & Upload Testcases</button>
            </div>
        </div>
    </div>

    <!-- Contestant Workspace -->
    <div id="contestant-workspace" class="flex flex-1 overflow-hidden">
        <!-- Sidebar: Problems & Leaderboard -->
        <div class="w-1/4 flex flex-col border-r border-gray-700 bg-gray-900">
            <!-- Problems -->
            <div class="p-4 border-b border-gray-700 flex-1 overflow-y-auto min-h-0">
                <h2 class="text-lg font-semibold mb-3 text-gray-200 uppercase tracking-wider text-sm">Problems</h2>
                <select id="problemId" class="w-full bg-gray-800 border border-gray-600 text-white rounded-md p-2 focus:outline-none focus:border-blue-500 transition-colors">
                    <option value="">Select a problem...</option>
                </select>
                <div class="mt-4 text-sm text-gray-400" id="problem-details">
                    Select a problem to begin.
                </div>
            </div>

            <!-- Leaderboard -->
            <div class="p-4 flex-1 overflow-y-auto min-h-0">
                <h2 class="text-lg font-semibold mb-3 text-gray-200 uppercase tracking-wider text-sm">Leaderboard</h2>
                <div class="bg-gray-800 rounded-md p-2">
                    <ul id="leaderboard-list" class="space-y-2">
                        <li class="text-gray-400 text-sm italic">Loading...</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Main Code Area -->
        <div class="flex-1 flex flex-col min-w-0 bg-gray-900">
            <!-- Editor Header -->
            <div class="bg-gray-800 p-2 border-b border-gray-700 flex justify-between items-center shrink-0">
                <span class="text-sm font-mono text-gray-400 ml-2">main</span>
                <select id="language" class="bg-gray-700 text-white border border-gray-600 rounded text-sm p-1 mr-2 focus:outline-none">
                    <option value="cpp">C++ (g++)</option>
                    <option value="python">Python 3</option>
                </select>
            </div>
            
            <!-- Monaco Editor Container -->
            <div id="editor" class="flex-1 w-full relative"></div>
            
            <!-- Controls -->
            <div class="p-4 bg-gray-800 border-t border-gray-700 shrink-0 flex justify-between items-center">
                <div class="text-sm text-gray-400">Ctrl+Enter to submit</div>
                <button id="submit-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-6 rounded-md transition-colors shadow-lg shadow-blue-500/20 focus:ring-2 focus:ring-blue-400 outline-none">
                    Submit Code
                </button>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="w-1/4 bg-gray-900 border-l border-gray-700 flex flex-col shrink-0">
            <div class="p-4 bg-gray-800 border-b border-gray-700 shrink-0">
                <h2 class="text-lg font-semibold text-gray-200 uppercase tracking-wider text-sm">Execution Result</h2>
            </div>
            <div class="p-4 flex-1 overflow-y-auto min-h-0">
                <div id="result-output" class="text-gray-300 space-y-4 text-sm font-mono">
                    <div class="text-gray-500 italic">No recent submissions.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-2xl transition-all duration-300 opacity-0 translate-y-10 z-50 text-sm font-medium"></div>

    <script src="/app.js"></script>
</body>
</html>
